<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>课堂听力专项练习</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #f0f7ff 0%, #e6edf5 100%);
            min-height: 100vh;
            padding: 20px;
            color: #1a2c3e;
        }

        .app-container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .view {
            padding: 28px 24px 40px;
        }

        .hidden-view {
            display: none;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
            border-bottom: 2px solid #cde0ed;
            padding-bottom: 20px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1f5e7e, #3282a3);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .header p {
            color: #5a7e9c;
            margin-top: 8px;
        }

        .exercise-grid {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin: 20px 0;
        }

        .card {
            background: white;
            border-radius: 32px;
            padding: 20px 28px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            border: 1px solid #e2edf5;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 28px -12px rgba(0, 32, 64, 0.15);
            border-color: #bdd7e8;
        }

        .card-info {
            display: flex;
            align-items: center;
            gap: 18px;
            flex-wrap: wrap;
        }

        .badge {
            background: #2c7da0;
            color: white;
            font-weight: 700;
            font-size: 1.3rem;
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            box-shadow: 0 6px 12px -6px rgba(44,125,160,0.3);
        }

        .card-title {
            font-size: 1.35rem;
            font-weight: 600;
            color: #1f4e6c;
        }

        .card-desc {
            font-size: 0.85rem;
            color: #6183a0;
            margin-top: 4px;
        }

        .arrow-icon {
            font-size: 1.6rem;
            color: #2c7da0;
            opacity: 0.65;
        }

        /* 详情页样式 */
        .practice-header {
            display: flex;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
            margin-bottom: 28px;
            border-bottom: 1px solid #cfe0ec;
            padding-bottom: 16px;
        }

        .back-btn {
            background: #eef3fc;
            border: none;
            padding: 10px 22px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 500;
            color: #2c7da0;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .back-btn:hover {
            background: #e0eaf4;
            transform: translateX(-4px);
            color: #135b7a;
        }

        .lesson-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1c597b;
        }

        .audio-card {
            background: white;
            border-radius: 40px;
            padding: 24px 28px;
            margin: 20px 0 28px;
            box-shadow: 0 12px 26px rgba(0, 0, 0, 0.04);
        }

        .simple-player {
            background: #f5fafe;
            border-radius: 60px;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
        }

        .play-btn {
            background: #2c7da0;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(44,125,160,0.3);
            transition: 0.2s;
            color: white;
            font-size: 26px;
        }

        .play-btn:hover {
            background: #1e5f7c;
            transform: scale(1.02);
        }

        .time-info {
            font-size: 1rem;
            font-family: monospace;
            background: #e9f0f5;
            padding: 6px 14px;
            border-radius: 40px;
            color: #1b5a7a;
            font-weight: 500;
        }

        audio {
            display: none;  /* 隐藏原生控件，使用自定义按钮 */
        }

        .transcript {
            background: #fefef7;
            border-radius: 32px;
            padding: 24px;
            line-height: 1.65;
            font-size: 1rem;
            color: #1f3b4c;
            border-left: 5px solid #2c7da0;
            white-space: pre-wrap;
            word-break: break-word;
        }

        footer {
            text-align: center;
            font-size: 0.75rem;
            color: #7b98b0;
            margin-top: 36px;
            padding-top: 12px;
            border-top: 1px solid #dee2e8;
        }

        .error-msg {
            color: #c74f2b;
            background: #fff0ed;
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 0.85rem;
            text-align: center;
        }

        @media (max-width: 600px) {
            .view { padding: 18px; }
            .card { padding: 16px 20px; }
            .play-btn { width: 52px; height: 52px; font-size: 22px; }
            .lesson-title { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- 总览页面 -->
    <div id="homeView" class="view">
        <div class="header">
            <h1>🎧 听力专项课堂</h1>
            <p>点击卡片进入练习 | 内置播放器 + 原文对照</p>
        </div>
        <div class="exercise-grid" id="exerciseList"></div>
        <footer>课堂专用 · 支持播放/暂停，点击卡片进入分页练习</footer>
    </div>

    <!-- 分页练习页面 -->
    <div id="detailView" class="view hidden-view">
        <div class="practice-header">
            <button class="back-btn" id="backToHomeBtn">← 返回目录</button>
            <div class="lesson-title" id="detailTitle">练习详情</div>
        </div>
        <div class="audio-card">
            <div class="simple-player">
                <button class="play-btn" id="playPauseBtn">▶</button>
                <span class="time-info" id="currentTime">0:00</span>
                <span class="time-info" id="durationTime">0:00</span>
            </div>
            <div class="transcript" id="transcriptText"></div>
            <div id="audioErrorMsg" class="error-msg" style="display: none; margin-top: 16px;">⚠️ 音频加载失败，请检查网络或联系老师</div>
        </div>
        <footer>👉 点击播放按钮收听，可随时暂停，适合课堂教学</footer>
    </div>
</div>

<script>
    // 练习数据（包含新的域名链接）
    const exercises = [
        {
            id: 1,
            title: "练习一 · Lingling's Day",
            audioUrl: "https://smallbear2026.dpdns.org/u6-4.mp3",
            transcript: `Hello, I'm Lingling. I get up at six thirty. I have breakfast at seven fifteen. After breakfast, I go to school. At eight thirty, I have classes. It's twelve o'clock. It's time for lunch. At four twenty in the afternoon, I go home. Then I do my homework at six thirty. At eight in the evening, I pack my schoolbag. I go to bed at nine o'clock. What a nice day!`
        },
        {
            id: 2,
            title: "练习二 · My School",
            audioUrl: "https://smallbear2026.dpdns.org/R2-6.mp3",
            transcript: `This is my school. It's beautiful. This is our classroom. It's on the second floor. That is the lab. It's big. It's on the first floor. We have two music rooms. They're on the first floor too. This is our library. It's on the third floor. We read here. I like my school.`
        },
        {
            id: 3,
            title: "练习三 · Jenny's New Home",
            audioUrl: "https://smallbear2026.dpdns.org/t1-5.mp3",
            transcript: `Hello! I'm Jenny. Welcome to my new home. Look! This is the living room. It's on the first floor. It's big and beautiful. We play and watch TV here. We have two bedrooms. They're on the first floor, too. Look, this is my room. It's very tidy. We have a bathroom on the first floor, too.\n\nLet's go to the second floor. Look! This is the dining room. It is big, too. We have dinner here. This is the kitchen. It's not big but nice. This is the reading room. I have many books in it. I like reading. I often read here. I love my new home!`
        },
        {
            id: 4,
            title: "练习四 · Wang Fang's Sunday",
            audioUrl: "https://smallbear2026.dpdns.org/t2-5.mp3",
            transcript: `Hello, my name is Wang Fang. It's Sunday today. I get up at seven twenty. After breakfast, I go to the park with my family. In the morning, I draw pictures under the tree. It's twelve now. It's time for picnic. We have bread, chicken, apples and orange juice. They're so yummy. In the afternoon, I play football with my brother. We go home at four o'clock.`
        },
        {
            id: 5,
            title: "练习五 · Sam's Day",
            audioUrl: "https://smallbear2026.dpdns.org/t2-6.mp3",
            transcript: `Hello, my name is Sam. I get up at six thirty. After breakfast, I go to school. I go to school at eight. At nine twenty, I go to the library. I read books in it. In the afternoon, I do sports. I play football at three ten. I have a lot of fun. I go home at four thirty. I do my homework at five o'clock. Then I pack my schoolbag. I do some chores at seven o'clock in the evening. This is my day. What about your day?`
        }
    ];

    // DOM 元素
    const homeView = document.getElementById('homeView');
    const detailView = document.getElementById('detailView');
    const exerciseListDiv = document.getElementById('exerciseList');
    const backBtn = document.getElementById('backToHomeBtn');
    const detailTitleSpan = document.getElementById('detailTitle');
    const transcriptDiv = document.getElementById('transcriptText');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const currentTimeSpan = document.getElementById('currentTime');
    const durationSpan = document.getElementById('durationTime');
    const errorMsgDiv = document.getElementById('audioErrorMsg');

    // 全局音频元素与状态
    let currentAudio = null;        // 当前正在使用的 audio 元素
    let currentExerciseId = null;
    let isPlaying = false;

    // 辅助：格式化时间
    function formatTime(seconds) {
        if (isNaN(seconds) || seconds === Infinity) return "0:00";
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }

    // 更新按钮图标
    function updateButtonIcon() {
        if (playPauseBtn) {
            playPauseBtn.innerHTML = isPlaying ? '⏸' : '▶';
        }
    }

    // 清理旧的音频及事件
    function cleanUpAudio() {
        if (currentAudio) {
            currentAudio.pause();
            currentAudio.removeEventListener('timeupdate', onTimeUpdate);
            currentAudio.removeEventListener('loadedmetadata', onLoadedMetadata);
            currentAudio.removeEventListener('ended', onAudioEnded);
            currentAudio.removeEventListener('error', onAudioError);
            currentAudio = null;
        }
        isPlaying = false;
        updateButtonIcon();
        if (currentTimeSpan) currentTimeSpan.innerText = "0:00";
        if (durationSpan) durationSpan.innerText = "0:00";
        if (errorMsgDiv) errorMsgDiv.style.display = 'none';
    }

    // 音频事件处理
    function onTimeUpdate() {
        if (currentAudio && !isNaN(currentAudio.duration) && currentAudio.duration !== Infinity) {
            currentTimeSpan.innerText = formatTime(currentAudio.currentTime);
        }
    }

    function onLoadedMetadata() {
        if (currentAudio && !isNaN(currentAudio.duration) && currentAudio.duration !== Infinity) {
            durationSpan.innerText = formatTime(currentAudio.duration);
            currentTimeSpan.innerText = "0:00";
            errorMsgDiv.style.display = 'none';
        } else if (currentAudio && currentAudio.duration === Infinity) {
            durationSpan.innerText = "0:00";
        }
    }

    function onAudioEnded() {
        isPlaying = false;
        updateButtonIcon();
        // 不重置时间，保留到最后位置，但按钮变为播放
        if (currentAudio) currentAudio.currentTime = 0;  // 重置到开头，方便重听
        if (currentTimeSpan) currentTimeSpan.innerText = "0:00";
    }

    function onAudioError(e) {
        console.error("音频加载错误", currentAudio ? currentAudio.src : "null");
        errorMsgDiv.style.display = 'block';
        isPlaying = false;
        updateButtonIcon();
        if (durationSpan) durationSpan.innerText = "加载失败";
    }

    // 初始化新的音频对象并绑定事件
    function initAudio(url) {
        cleanUpAudio();
        const audio = new Audio(url);
        audio.preload = "metadata";
        audio.addEventListener('timeupdate', onTimeUpdate);
        audio.addEventListener('loadedmetadata', onLoadedMetadata);
        audio.addEventListener('ended', onAudioEnded);
        audio.addEventListener('error', onAudioError);
        currentAudio = audio;
        // 如果已经准备好，主动触发一次元数据读取
        if (audio.readyState >= 1) {
            onLoadedMetadata();
        }
        return audio;
    }

    // 播放/暂停切换
    function togglePlayPause() {
        if (!currentAudio) return;
        if (isPlaying) {
            currentAudio.pause();
            isPlaying = false;
            updateButtonIcon();
        } else {
            // 播放当前音频
            const playPromise = currentAudio.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    isPlaying = true;
                    updateButtonIcon();
                }).catch(err => {
                    console.warn("播放失败:", err);
                    errorMsgDiv.style.display = 'block';
                    errorMsgDiv.innerText = "⚠️ 自动播放被阻止，请点击页面后重试。";
                    isPlaying = false;
                    updateButtonIcon();
                    // 延迟恢复提示
                    setTimeout(() => {
                        if (errorMsgDiv.innerText.includes("自动播放被阻止")) {
                            errorMsgDiv.innerText = "⚠️ 音频加载失败，请检查网络或手动点击播放";
                        }
                    }, 3000);
                });
            } else {
                // 兼容旧浏览器
                currentAudio.play();
                isPlaying = true;
                updateButtonIcon();
            }
        }
    }

    // 渲染分页详情
    function renderDetail(exerciseId) {
        const exercise = exercises.find(ex => ex.id === exerciseId);
        if (!exercise) return;

        // 停止当前播放并清空
        cleanUpAudio();

        // 更新标题和文本
        detailTitleSpan.innerText = exercise.title;
        transcriptDiv.innerText = exercise.transcript;

        // 初始化新音频
        initAudio(exercise.audioUrl);
        currentExerciseId = exercise.id;

        // 重置错误提示
        if (errorMsgDiv) errorMsgDiv.style.display = 'none';
    }

    // 视图切换: 显示总览
    function showHome() {
        cleanUpAudio();
        homeView.classList.remove('hidden-view');
        detailView.classList.add('hidden-view');
        document.title = "听力专项课堂 · 目录";
    }

    // 显示分页
    function showDetail(exerciseId) {
        homeView.classList.add('hidden-view');
        detailView.classList.remove('hidden-view');
        document.title = `听力练习 ${exerciseId} · 课堂专项`;
        renderDetail(exerciseId);
    }

    // 生成总览卡片
    function buildHomeList() {
        if (!exerciseListDiv) return;
        exerciseListDiv.innerHTML = '';
        exercises.forEach(ex => {
            const card = document.createElement('div');
            card.className = 'card';
            card.setAttribute('data-id', ex.id);
            card.addEventListener('click', () => showDetail(ex.id));
            card.innerHTML = `
                <div class="card-info">
                    <div class="badge">${ex.id}</div>
                    <div>
                        <div class="card-title">${ex.title}</div>
                        <div class="card-desc">点击进入 → 听力原文 + 播放器</div>
                    </div>
                </div>
                <div class="arrow-icon">➡️</div>
            `;
            exerciseListDiv.appendChild(card);
        });
    }

    // 绑定返回按钮
    function bindBackButton() {
        if (backBtn) {
            // 移除原有监听，重新绑定
            const newBack = backBtn.cloneNode(true);
            backBtn.parentNode.replaceChild(newBack, backBtn);
            newBack.addEventListener('click', showHome);
            // 更新全局引用
            window.backBtn = newBack;
        }
    }

    // 绑定播放按钮（因为按钮可能会在DOM中保持不变，但初次加载时存在）
    function bindPlayButton() {
        if (playPauseBtn) {
            // 移除旧监听避免重复
            const newPlay = playPauseBtn.cloneNode(true);
            playPauseBtn.parentNode.replaceChild(newPlay, playPauseBtn);
            newPlay.addEventListener('click', togglePlayPause);
            // 更新引用
            window.playBtn = newPlay;
        }
    }

    // 初始化应用
    function init() {
        buildHomeList();
        bindBackButton();
        bindPlayButton();
        showHome(); // 默认显示目录页
        // 额外保险：每次detailView显示时确保播放按钮事件存在（由于DOM未重新创建，上述绑定已全局）
        // 但为了防止某些极端情况，监听页面内的动态变化
        const observer = new MutationObserver(() => {
            const btn = document.getElementById('playPauseBtn');
            if (btn && !btn._listenerAttached) {
                btn.addEventListener('click', togglePlayPause);
                btn._listenerAttached = true;
            }
            const back = document.getElementById('backToHomeBtn');
            if (back && !back._listenerAttached) {
                back.addEventListener('click', showHome);
                back._listenerAttached = true;
            }
        });
        observer.observe(document.getElementById('detailView'), { childList: true, subtree: true });
    }

    init();
</script>
</body>
</html>
